name: Contract drift

# Fails if this repo's vendored copy of the canonical ecosystem contract
# (src/lib/waqty_contract.ts) drifts from its committed baseline
# (src/lib/contract.lock). The local shim src/lib/contract.ts (Canonical* aliases)
# is not guarded. Re-sync from <repo-root>/contract via `node ../contract/sync.mjs`,
# then re-baseline with `npm run contract:check -- --write`.

on:
  push:
  pull_request:

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Zero-dependency check — no `npm install` needed.
      - run: node scripts/check-contract.mjs
